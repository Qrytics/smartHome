[pytest]
# ---------------------------------------------------------------------------
# Marker definitions for modular IoT hardware testing
# ---------------------------------------------------------------------------
# Each marker corresponds to one physical hardware component.
# Run a single component's tests with:
#   pytest -m bme280
# Run everything except hardware-dependent tests:
#   pytest -m "not integration"
# ---------------------------------------------------------------------------
markers =
    bme280:           BME280 environmental sensor (temperature / humidity / pressure)
    temt6000:         TEMT6000 ambient light sensor (lux / ADC conversion / harvest)
    dimmer:           PWM LED dimmer module (LEDC 0-100%%)
    fan_relay:        Fan relay control (on/off / state persistence)
    rfid:             MFRC522 RFID reader (card scan / whitelist lookup)
    solenoid:         Solenoid door-lock relay (grant / deny / fail-secure)
    room_node:        Full room-node ESP32 (BME280 + TEMT6000 + dimmer + fan)
    door_node:        Full door-node ESP32 (RFID + solenoid lock)
    websocket:        WebSocket command delivery and device management
    backend_only:     Tests that run entirely without hardware (mocked services)
    integration:      Tests that require live infrastructure (DB / broker / real device)

asyncio_mode = auto

testpaths = tests

# Show short test summary for failures and errors
addopts = -ra
