  <text class="t boxTitle" font-size="0.39" x="20.273333333333337" y="3.41">What judges see in 20 seconds</text>
  <text class="t boxSub" font-size="0.26" x="20.273333333333337" y="3.7300000000000004">One glance at the story: web stack + physical edge + proof.</text>
</g>
<text class="t p" font-size="0.38" x="20.323333333333338" y="3.98">• React dashboard: live charts + access logs</text>
<text class="t p" font-size="0.38" x="20.323333333333338" y="4.55">+ control actions</text>
<text class="t p" font-size="0.38" x="20.323333333333338" y="5.3100000000000005">• FastAPI + broker + TimescaleDB: ingest,</text>
<text class="t p" font-size="0.38" x="20.323333333333338" y="5.880000000000001">policy, and persistence</text>
<text class="t p" font-size="0.38" x="20.323333333333338" y="6.6400000000000015">• ESP32 edge: RFID/lock, sensors, and</text>
<text class="t p" font-size="0.38" x="20.323333333333338" y="7.210000000000002">actuation paths</text>
