<rect x="0.48" y="0.48" width="29.04" height="39.04" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
<rect x="0.48" y="0.48" width="29.04" height="2.45" fill="#0f172a"/>
<text class="t h1" font-size="0.82" x="0.83" y="1.5" fill="#ffffff">Smart Home Model</text>
<text class="t sub" font-size="0.24" x="0.83" y="2" fill="#cbd5e1">Web-first building management: secure access, live telemetry, policy-driven control</text>
<text class="t meta" font-size="0.21" x="29.169999999999998" y="1.4" text-anchor="end" fill="#cbd5e1">Mario Belmonte, Cindy Chen · 18-500</text>
<g>
  <rect x="0.48" y="3.0500000000000003" width="9.446666666666667" height="15.9075" rx="0.12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="0.48" y="3.0500000000000003" width="9.446666666666667" height="0.88" rx="0.12" fill="#0f172a" opacity="0.06"/>
  <text class="t boxTitle" font-size="0.39" x="0.6799999999999999" y="3.41">Product pitch</text>
  <text class="t boxSub" font-size="0.26" x="0.6799999999999999" y="3.7300000000000004">Bold the outcomes you can defend with evidence (targets + test results).</text>
</g>
<text class="t p" x="0.73" y="3.98" font-size="0.38" font-weight="800">Key outcomes: dashboard freshness,</text>
<text class="t p" x="0.73" y="4.55" font-size="0.38" font-weight="800">access-path latency where measured, and</text>
<text class="t p" x="0.73" y="5.12" font-size="0.38" font-weight="800">complete logging in Timescale for</text>
<text class="t p" x="0.73" y="5.69" font-size="0.38" font-weight="800">auditability.</text>
<text class="t p" x="0.73" y="4.71" font-size="0.36">Use case: a building manager needs one place to</text>
<text class="t p" x="0.73" y="5.25" font-size="0.36">see environment + enforce access in real time.</text>
<text class="t p" x="0.73" y="5.79" font-size="0.36">The house is a physical demo: door access and</text>
<text class="t p" x="0.73" y="6.33" font-size="0.36">room telemetry are driven by the web platform.</text>
<text class="t p" x="0.73" y="6.87" font-size="0.36">Key targets: dashboard updates &lt; 1 s, access</text>
<text class="t p" x="0.73" y="7.41" font-size="0.36">checks &lt; 500 ms (p95), and auditable event</text>
<text class="t p" x="0.73" y="7.95" font-size="0.36">logging.</text>
<g>
  <rect x="10.276666666666667" y="3.0500000000000003" width="9.446666666666667" height="9.22635" rx="0.12" fill="#ffffff" stroke="#e2e8f0"/>
