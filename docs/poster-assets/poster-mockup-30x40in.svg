  <text class="t boxTitle" font-size="0.39" x="10.476666666666667" y="31.532650000000004">Engineering trade-off</text>
  <text class="t boxSub" font-size="0.26" x="10.476666666666667" y="31.852650000000004">Latency vs security vs real hardware constraints.</text>
</g>
<text class="t p" x="10.526666666666667" y="32.102650000000004" font-size="0.34">We optimized for a responsive operator loop:</text>
<text class="t p" x="10.526666666666667" y="32.61265" font-size="0.34">measured server-side timings are far under our UI</text>
<text class="t p" x="10.526666666666667" y="33.12265000000001" font-size="0.34">targets. Partial hardware cases (e.g. lighting</text>
<text class="t p" x="10.526666666666667" y="33.632650000000005" font-size="0.34">without a physical lamp) are called out as</text>
<text class="t p" x="10.526666666666667" y="34.14265" font-size="0.34">limitations.</text>
