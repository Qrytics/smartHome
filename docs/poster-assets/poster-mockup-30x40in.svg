<text class="t p" font-size="0.38" x="20.323333333333338" y="20.0475">• Open dashboard: show a live sensor trace</text>
<text class="t p" font-size="0.38" x="20.323333333333338" y="20.6175">updating</text>
<text class="t p" font-size="0.38" x="20.323333333333338" y="21.3775">• Swipe RFID: show grant + log line + lock</text>
