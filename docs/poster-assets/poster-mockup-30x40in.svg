<text class="t h1" font-size="0.72" x="0.9" y="1.6" fill="#ffffff">Smart Home Model</text>
<text class="t sub" font-size="0.2" x="0.9" y="2.0300000000000002" fill="#cbd5e1">Web-first building management: secure access, live telemetry, policy-driven control</text>
<text class="t meta" font-size="0.18" x="29.099999999999998" y="1.5" text-anchor="end" fill="#cbd5e1">Mario Belmonte, Cindy Chen · 18-500</text>
<g>
  <rect x="0.55" y="3.45" width="9.4" height="15.615000000000002" rx="0.12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="0.55" y="3.45" width="9.4" height="0.92" rx="0.12" fill="#0f172a" opacity="0.06"/>
  <text class="t boxTitle" font-size="0.34" x="0.77" y="3.83">Product pitch</text>
  <text class="t boxSub" font-size="0.22" x="0.77" y="4.17">Bold the outcomes you can defend with evidence (targets + test results).</text>
</g>
<text class="t p" x="0.8" y="4.5" font-size="0.33" font-weight="800">Key outcomes: dashboard freshness, access-path</text>
<text class="t p" x="0.8" y="4.995" font-size="0.33" font-weight="800">latency where measured, and complete logging in</text>
<text class="t p" x="0.8" y="5.49" font-size="0.33" font-weight="800">Timescale for auditability.</text>
<text class="t p" x="0.8" y="5.2" font-size="0.3">Use case: a building manager needs one place to see</text>
<text class="t p" x="0.8" y="5.65" font-size="0.3">environment + enforce access in real time. The house is a</text>
<text class="t p" x="0.8" y="6.1" font-size="0.3">physical demo: door access and room telemetry are driven</text>
<text class="t p" x="0.8" y="6.55" font-size="0.3">by the web platform. Key targets: dashboard updates &lt; 1</text>
<text class="t p" x="0.8" y="7" font-size="0.3">s, access checks &lt; 500 ms (p95), and auditable event</text>
<text class="t p" x="0.8" y="7.45" font-size="0.3">logging.</text>
<g>
