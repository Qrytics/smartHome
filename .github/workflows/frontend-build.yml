name: Frontend Build

on:
  push:
    branches: [ main, web-changes-v1, copilot/refactor-smart-home-setup ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    branches: [ main, web-changes-v1 ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:8000
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 7
